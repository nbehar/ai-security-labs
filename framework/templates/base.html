<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ title | default("AI Security Lab") }}</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>{{ emoji | default("&#x1F6E1;") }}</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/styles.css" />
</head>
<body>
  <div class="layout">
    <header class="hero">
      <div class="hero__inner">
        <h1 class="hero__title">{{ hero_title | default("AI Security Lab") }} <span class="hero__sub">NexaCore Technologies</span></h1>
        <h5 class="hero__org">Prof. Nikolas Behar &middot; {{ hero_subtitle | default("Interactive Security Workshop") }}</h5>
        <p class="hero__desc">{{ hero_desc | default("") }}</p>
      </div>
    </header>

    <nav class="tabs" role="tablist" id="tabs-nav"></nav>
    <main class="main" id="main"></main>

    <footer class="footer">
      Workshop by Prof. Nikolas Behar &middot; <a href="https://genai.owasp.org/" target="_blank" rel="noopener">OWASP GenAI Security Project</a>
    </footer>
  </div>

  <script type="module" src="/static/js/app.js"></script>
</body>
</html>
