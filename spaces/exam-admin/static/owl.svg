<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 130" width="48" height="64">
  <!-- Geometric owl silhouette — colorized to gold by .owl-gold CSS filter -->
  <!-- Ear tufts -->
  <polygon points="30,24 22,4 36,18" fill="#d97706"/>
  <polygon points="70,24 78,4 64,18" fill="#d97706"/>
  <!-- Head -->
  <circle cx="50" cy="36" r="26" fill="#d97706"/>
  <!-- Eye rings -->
  <circle cx="38" cy="34" r="9" fill="#09090f"/>
  <circle cx="62" cy="34" r="9" fill="#09090f"/>
  <circle cx="38" cy="34" r="6" fill="#d97706"/>
  <circle cx="62" cy="34" r="6" fill="#d97706"/>
  <circle cx="38" cy="34" r="3" fill="#09090f"/>
  <circle cx="62" cy="34" r="3" fill="#09090f"/>
  <!-- Eye highlight -->
  <circle cx="40" cy="32" r="1.5" fill="#d97706"/>
  <circle cx="64" cy="32" r="1.5" fill="#d97706"/>
  <!-- Beak -->
  <polygon points="50,42 44,50 56,50" fill="#09090f"/>
  <!-- Body -->
  <ellipse cx="50" cy="95" rx="26" ry="28" fill="#d97706"/>
  <!-- Wing left -->
  <path d="M24,78 Q8,68 12,90 Q15,106 28,98" fill="#d97706"/>
  <!-- Wing right -->
  <path d="M76,78 Q92,68 88,90 Q85,106 72,98" fill="#d97706"/>
  <!-- Belly feather hint -->
  <ellipse cx="50" cy="95" rx="14" ry="18" fill="#09090f" opacity="0.18"/>
  <!-- Feet -->
  <line x1="40" y1="120" x2="33" y2="128" stroke="#d97706" stroke-width="3" stroke-linecap="round"/>
  <line x1="40" y1="120" x2="40" y2="128" stroke="#d97706" stroke-width="3" stroke-linecap="round"/>
  <line x1="40" y1="120" x2="47" y2="128" stroke="#d97706" stroke-width="3" stroke-linecap="round"/>
  <line x1="60" y1="120" x2="53" y2="128" stroke="#d97706" stroke-width="3" stroke-linecap="round"/>
  <line x1="60" y1="120" x2="60" y2="128" stroke="#d97706" stroke-width="3" stroke-linecap="round"/>
  <line x1="60" y1="120" x2="67" y2="128" stroke="#d97706" stroke-width="3" stroke-linecap="round"/>
</svg>
